<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BW16 Alert Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#060a10;--card:#0d1321;--card2:#131b2e;--bdr:#1a2744;--txt:#e2e8f0;--dim:#4a5e80;--red:#ef4444;--red2:rgba(239,68,68,.15);--red3:rgba(239,68,68,.25);--grn:#22c55e;--grn2:rgba(34,197,94,.15);--blu:#3b82f6;--blu2:rgba(59,130,246,.15);--ylw:#eab308;--ylw2:rgba(234,179,8,.15);--pur:#a855f7;--pur2:rgba(168,85,247,.15);--cyn:#06b6d4;--cyn2:rgba(6,182,212,.15)}
    body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
    body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(26,39,68,.2) 1px,transparent 1px),linear-gradient(90deg,rgba(26,39,68,.2) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .container{max-width:920px;margin:0 auto;padding:16px;position:relative;z-index:1}
    .header{text-align:center;padding:32px 0 24px}
    .header h1{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;letter-spacing:3px}
    .header h1 .red{color:var(--red)}
    .header .sub{color:var(--dim);font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:4px}
    .alarm-banner{display:none;background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.04));border:1px solid rgba(239,68,68,.4);border-radius:12px;padding:18px 24px;margin-bottom:20px;align-items:center;justify-content:space-between;animation:bp 2s infinite}
    .alarm-banner.active{display:flex}
    @keyframes bp{0%,100%{border-color:rgba(239,68,68,.4)}50%{border-color:rgba(239,68,68,.8);box-shadow:0 0 30px rgba(239,68,68,.15)}}
    .alarm-banner .left{display:flex;align-items:center;gap:12px}
    .alarm-banner .pulse-dot{width:12px;height:12px;background:var(--red);border-radius:50%;animation:pd 1s infinite}
    @keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
    .alarm-banner .text{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--red)}
    .dismiss-all-btn{padding:10px 24px;background:var(--red);color:#fff;border:none;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:1px}
    .dismiss-all-btn:hover{background:#dc2626;transform:scale(1.03)}
    .status-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
    .status-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px;text-align:center}
    .status-card .label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace}
    .status-card .value{font-size:20px;font-weight:700;margin-top:4px;font-family:'JetBrains Mono',monospace}
    .value.online{color:var(--grn)}.value.offline{color:var(--red)}.value.count{color:var(--red)}.value.info{color:var(--blu)}.value.ble-on{color:var(--cyn)}.value.ble-off{color:var(--dim)}
    .controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .btn{padding:7px 16px;border:1px solid var(--bdr);border-radius:6px;background:var(--card);color:var(--txt);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:12px;transition:all .2s}
    .btn:hover{background:var(--card2);border-color:var(--blu)}
    .btn.danger:hover{border-color:var(--red);background:var(--red2)}
    .filter-group{display:flex;gap:4px;margin-left:auto}
    .filter-btn{padding:5px 10px;border:1px solid var(--bdr);border-radius:4px;background:transparent;color:var(--dim);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;transition:all .2s}
    .filter-btn.active{background:var(--blu2);border-color:var(--blu);color:var(--blu)}
    .filter-btn:hover{color:var(--txt)}
    .alert-list{display:flex;flex-direction:column;gap:6px}
    .alert-item{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:12px 16px;display:flex;align-items:flex-start;gap:12px;animation:si .3s ease;transition:all .2s}
    .alert-item:hover{border-color:rgba(255,255,255,.08)}
    .alert-item.new-alert{border-color:var(--red);box-shadow:0 0 25px var(--red3)}
    .alert-item.dismissed-item{opacity:.5}
    .alert-item.dismiss-type{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.03)}
    @keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .alert-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .alert-icon.gpio{background:var(--red2);color:var(--red)}
    .alert-icon.uart{background:var(--pur2);color:var(--pur)}
    .alert-icon.manual{background:var(--ylw2);color:var(--ylw)}
    .alert-icon.ble{background:var(--cyn2);color:var(--cyn)}
    .alert-icon.dismiss{background:var(--grn2);color:var(--grn)}
    .alert-content{flex:1;min-width:0}
    .alert-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
    .alert-type{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:1px}
    .alert-type.gpio{background:var(--red2);color:var(--red)}
    .alert-type.uart{background:var(--pur2);color:var(--pur)}
    .alert-type.manual{background:var(--ylw2);color:var(--ylw)}
    .alert-type.ble{background:var(--cyn2);color:var(--cyn)}
    .alert-type.dismiss{background:var(--grn2);color:var(--grn)}
    .alert-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)}
    .dismissed-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 6px;border-radius:3px;background:var(--grn2);color:var(--grn)}
    .alert-message{font-size:13px;word-break:break-all}
    .alert-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-top:3px}
    .alert-actions{flex-shrink:0;align-self:center}
    .dismiss-btn{padding:5px 12px;background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:5px;color:var(--red);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s}
    .dismiss-btn:hover{background:var(--red2);border-color:var(--red)}
    .empty{text-align:center;padding:50px 20px;color:var(--dim)}
    .empty .icon{font-size:40px;margin-bottom:12px;opacity:.3}
    .sound-toggle{position:fixed;bottom:16px;right:16px;z-index:100}
    .sound-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--bdr);background:var(--card);color:var(--dim);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .sound-btn.on{border-color:var(--grn);color:var(--grn)}
    @media(max-width:600px){.header h1{font-size:20px}.alarm-banner{flex-direction:column;gap:12px;text-align:center}.filter-group{margin-left:0;width:100%;justify-content:center}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>&gt;_ BW16 <span class="red">ALERT</span> MONITOR</h1>
      <div class="sub">RTL8720DN &middot; WiFi + BLE + GPIO + UART</div>
    </div>
    <div class="alarm-banner" id="alarmBanner">
      <div class="left"><div class="pulse-dot"></div><div class="text">ALARM ACTIVE</div></div>
      <button class="dismiss-all-btn" onclick="dismissAll()">DISMISS ALARM</button>
    </div>
    <div class="status-bar">
      <div class="status-card"><div class="label">Server</div><div class="value online" id="serverStatus">--</div></div>
      <div class="status-card"><div class="label">Alarm</div><div class="value" id="alarmStatus">--</div></div>
      <div class="status-card"><div class="label">Alerts</div><div class="value count" id="totalAlerts">0</div></div>
      <div class="status-card"><div class="label">RSSI</div><div class="value info" id="latestRssi">--</div></div>
      <div class="status-card"><div class="label">BLE</div><div class="value" id="bleStatus">--</div></div>
    </div>
    <div class="controls">
      <button class="btn danger" onclick="clearAll()">Clear History</button>
      <div class="filter-group">
        <button class="filter-btn active" onclick="setFilter('ALL',this)">ALL</button>
        <button class="filter-btn" onclick="setFilter('GPIO',this)">GPIO</button>
        <button class="filter-btn" onclick="setFilter('UART',this)">UART</button>
        <button class="filter-btn" onclick="setFilter('BLE',this)">BLE</button>
        <button class="filter-btn" onclick="setFilter('MANUAL',this)">TEST</button>
      </div>
    </div>
    <div class="alert-list" id="alertList">
      <div class="empty"><div class="icon">&#128225;</div><p>Waiting for alerts from BW16...</p></div>
    </div>
  </div>
  <div class="sound-toggle"><button class="sound-btn" id="soundBtn" onclick="toggleSound()">&#128264;</button></div>
  <script>
    let allAlerts=[],lastAlertId=0,currentFilter='ALL',soundEnabled=false,isFirstLoad=true,currentAlarmState=false;
    let audioCtx=null;
    function playBeep(){if(!soundEnabled)return;try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=880;o.type='square';g.gain.value=.08;o.start();g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.3);o.stop(audioCtx.currentTime+.3)}catch(e){}}
    function toggleSound(){soundEnabled=!soundEnabled;const b=document.getElementById('soundBtn');b.className=soundEnabled?'sound-btn on':'sound-btn';b.innerHTML=soundEnabled?'&#128266;':'&#128264;'}
    function getIcon(t){const i={GPIO:'&#9889;',UART:'&#8644;',MANUAL:'&#9998;',BLE:'&#9763;',DISMISS:'&#10004;'};return i[t.toUpperCase()]||'&#9679;'}
    function formatTime(iso){return new Date(iso).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
    function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
    function renderAlerts(){
      const list=document.getElementById('alertList');
      const filtered=currentFilter==='ALL'?allAlerts:allAlerts.filter(a=>a.type.toUpperCase()===currentFilter);
      if(filtered.length===0){list.innerHTML='<div class="empty"><div class="icon">&#128225;</div><p>No alerts matching filter</p></div>';return}
      list.innerHTML=filtered.map((a,i)=>{
        const t=a.type.toUpperCase(),isDismiss=t==='DISMISS',isNew=i===0&&!isFirstLoad&&!isDismiss,showBtn=!a.dismissed&&!isDismiss&&t!=='BLE';
        return`<div class="alert-item ${isNew?'new-alert':''} ${a.dismissed?'dismissed-item':''} ${isDismiss?'dismiss-type':''}">
          <div class="alert-icon ${t.toLowerCase()}">${getIcon(t)}</div>
          <div class="alert-content">
            <div class="alert-top">
              <span class="alert-type ${t.toLowerCase()}">${t}</span>
              <span class="alert-time">${formatTime(a.timestamp)}</span>
              ${a.dismissed&&!isDismiss?'<span class="dismissed-badge">HANDLED</span>':''}
            </div>
            <div class="alert-message">${escapeHtml(a.message)}</div>
            <div class="alert-meta">${a.rssi?'RSSI: '+a.rssi+' dBm':''}${a.ip?' | IP: '+a.ip:''}${a.ble?' | BLE: Connected':''}</div>
          </div>
          ${showBtn?`<div class="alert-actions"><button class="dismiss-btn" onclick="dismissOne(${a.id})">Dismiss</button></div>`:''}</div>`
      }).join('')
    }
    function updateAlarmBanner(active){
      currentAlarmState=active;
      document.getElementById('alarmBanner').classList.toggle('active',active);
      const s=document.getElementById('alarmStatus');
      if(active){s.textContent='ACTIVE';s.className='value offline'}else{s.textContent='CLEAR';s.className='value online'}
    }
    function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAlerts()}
    async function fetchAlerts(){
      try{
        const url=lastAlertId>0?`/api/alerts?since=${lastAlertId}`:'/api/alerts';
        const res=await fetch(url);const data=await res.json();const n=data.alerts||[];
        if(n.length>0){
          if(lastAlertId>0){allAlerts=[...n,...allAlerts];if(n.some(a=>a.type!=='DISMISS'&&a.type!=='BLE'))playBeep()}
          else{allAlerts=n}
          lastAlertId=allAlerts[0].id;
          document.getElementById('totalAlerts').textContent=allAlerts.length;
          const l=allAlerts.find(a=>a.rssi)||{};
          if(l.rssi)document.getElementById('latestRssi').textContent=l.rssi+' dBm';
          const bl=allAlerts.find(a=>a.ble!==undefined),be=document.getElementById('bleStatus');
          if(bl&&bl.ble){be.textContent='ON';be.className='value ble-on'}else{be.textContent='OFF';be.className='value ble-off'}
          renderAlerts();isFirstLoad=false
        }else if(isFirstLoad){isFirstLoad=false;renderAlerts()}
        updateAlarmBanner(data.alarm);
        document.getElementById('serverStatus').textContent='ONLINE';document.getElementById('serverStatus').className='value online'
      }catch(e){document.getElementById('serverStatus').textContent='OFFLINE';document.getElementById('serverStatus').className='value offline'}
    }
    async function dismissOne(id){try{await fetch('/api/dismiss',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({alertId:id,source:'WEB'})});const a=allAlerts.find(x=>x.id===id);if(a){a.dismissed=true;a.dismissedBy='WEB'}updateAlarmBanner(false);renderAlerts()}catch(e){}}
    async function dismissAll(){try{await fetch('/api/dismiss-all',{method:'POST'});allAlerts.forEach(a=>a.dismissed=true);updateAlarmBanner(false);renderAlerts()}catch(e){}}
    async function clearAll(){if(!confirm('Clear all alert history?'))return;try{await fetch('/api/alerts',{method:'DELETE'});allAlerts=[];lastAlertId=0;document.getElementById('totalAlerts').textContent='0';updateAlarmBanner(false);renderAlerts()}catch(e){}}
    fetchAlerts();setInterval(fetchAlerts,2000);
  </script>
</body>
</html>
